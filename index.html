<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Village Walk Knowledge Quiz</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #e8edf2, #d0d8e4);
      min-height: 100vh;
      padding: 20px;
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }
    .container { max-width: 680px; width: 100%; }

    h1 { text-align: center; color: #1e293b; font-size: 1.5rem; margin-bottom: 4px; }
    .subtitle { text-align: center; color: #64748b; font-size: 0.85rem; margin-bottom: 20px; }

    /* Filter buttons */
    .filters {
      display: flex; flex-wrap: wrap; gap: 8px;
      justify-content: center; margin-bottom: 20px;
    }
    .filter-btn {
      font-size: 0.75rem; padding: 6px 14px; border-radius: 999px;
      border: 1.5px solid #cbd5e1; background: white; color: #475569;
      cursor: pointer; font-weight: 600; transition: all 0.2s;
    }
    .filter-btn.active { background: #1e293b; color: white; border-color: #1e293b; }
    .filter-btn:hover:not(.active) { border-color: #94a3b8; }

    /* Card */
    .card {
      background: white; border-radius: 18px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      padding: 28px; border: 2px solid #e2e8f0;
    }

    /* Progress bar */
    .progress-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .badge {
      font-size: 0.7rem; font-weight: 700; padding: 4px 12px;
      border-radius: 999px; letter-spacing: 0.02em;
    }
    .badge-fees    { background: #d1fae5; color: #065f46; }
    .badge-lease   { background: #dbeafe; color: #1e40af; }
    .badge-viol    { background: #fef3c7; color: #92400e; }
    .badge-ar      { background: #ede9fe; color: #5b21b6; }
    .badge-sales   { background: #ffe4e6; color: #9f1239; }
    .badge-comm    { background: #fef9c3; color: #713f12; }
    .badge-arch    { background: #e0f2fe; color: #0c4a6e; }
    .badge-hot     { background: #f3e8ff; color: #581c87; }
    .badge-forms   { background: #fff7ed; color: #7c2d12; }
    .badge-comm    { background: #fce7f3; color: #9d174d; }
    .badge-acc     { background: #ffedd5; color: #9a3412; }
    .badge-hw      { background: #e0f2fe; color: #075985; }
    .badge-forms   { background: #f0fdf4; color: #14532d; }
    .score-text { font-size: 0.8rem; color: #64748b; font-weight: 600; }
    .progress-bar { background: #e2e8f0; border-radius: 999px; height: 6px; margin-bottom: 20px; }
    .progress-fill { background: #1e293b; height: 6px; border-radius: 999px; transition: width 0.4s; }

    /* Scenario box */
    .scenario-box {
      background: #f8fafc; border-radius: 12px; padding: 14px 16px;
      margin-bottom: 16px; border: 1px solid #e2e8f0;
    }
    .scenario-label { font-size: 0.68rem; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 4px; }
    .scenario-text { color: #374151; font-size: 0.9rem; line-height: 1.55; }

    .question { font-size: 1rem; font-weight: 700; color: #1e293b; margin-bottom: 16px; }

    /* Options */
    .options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
    .option-btn {
      text-align: left; padding: 12px 16px; border-radius: 12px;
      border: 2px solid #e2e8f0; background: #f8fafc; color: #374151;
      font-size: 0.88rem; cursor: pointer; transition: all 0.15s; width: 100%;
      line-height: 1.4;
    }
    .option-btn:hover:not(:disabled) { border-color: #94a3b8; background: #f1f5f9; }
    .option-btn .letter { font-weight: 800; margin-right: 8px; }
    .option-btn.correct   { background: #d1fae5; border-color: #34d399; color: #064e3b; font-weight: 600; }
    .option-btn.wrong     { background: #fee2e2; border-color: #f87171; color: #7f1d1d; }
    .option-btn.dimmed    { opacity: 0.45; }
    .option-btn:disabled  { cursor: default; }

    /* Explanation */
    .explanation {
      background: #f8fafc; border-radius: 12px; padding: 14px 16px;
      margin-bottom: 16px; border: 1px solid #e2e8f0;
    }
    .explanation-label { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
    .explanation-label.ok  { color: #059669; }
    .explanation-label.err { color: #dc2626; }
    .explanation-text { font-size: 0.88rem; color: #374151; line-height: 1.55; }

    /* Buttons */
    .next-btn, .restart-btn {
      width: 100%; padding: 14px; border-radius: 12px;
      background: #1e293b; color: white; font-size: 0.95rem;
      font-weight: 700; border: none; cursor: pointer; transition: background 0.2s;
    }
    .next-btn:hover, .restart-btn:hover { background: #0f172a; }

    /* Results */
    .results { text-align: center; }
    .big-score { font-size: 4rem; font-weight: 800; margin-bottom: 6px; }
    .score-green { color: #059669; }
    .score-amber { color: #d97706; }
    .score-red   { color: #dc2626; }
    .result-sub  { color: #475569; font-size: 1rem; margin-bottom: 6px; }
    .result-msg  { color: #94a3b8; font-size: 0.88rem; margin-bottom: 24px; }
    .answer-list { text-align: left; margin-bottom: 24px; display: flex; flex-direction: column; gap: 8px; }
    .answer-item {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 10px 14px; border-radius: 10px; font-size: 0.83rem; line-height: 1.4;
    }
    .answer-item.ok  { background: #d1fae5; color: #065f46; }
    .answer-item.err { background: #fee2e2; color: #7f1d1d; }
    .answer-icon { flex-shrink: 0; font-size: 1rem; margin-top: 1px; }
    .answer-cat  { font-weight: 700; }

    @media (max-width: 500px) {
      .card { padding: 18px; }
      h1 { font-size: 1.2rem; }
    }
  </style>
</head>
<body>
<div class="container">
  <h1>Village Walk Knowledge Quiz</h1>
  <p class="subtitle">KW Property Management &bull; Scenario-Based Training</p>

  <div class="filters" id="filters"></div>
  <div class="card" id="card"></div>
</div>

<script>
const questions = [

  { cat:"💰 Fees & Applications", badge:"badge-fees",

  { cat:"💰 Fees & Applications", badge:"badge-fees",

  { cat:"💰 Fees & Applications", badge:"badge-fees",

  { cat:"📋 Leases & Renewals", badge:"badge-lease",

  { cat:"📋 Leases & Renewals", badge:"badge-lease",

  { cat:"⚠️ Violations", badge:"badge-viol",
    scenario:"The Fine Hearing Meeting is scheduled for December 12th. You need to send the 2nd violation letter.",
    question:"What is the LATEST date you can send the 2nd letter?",
    options:["December 11th","December 5th","November 28th","November 30th"], correct:2,
    explanation:"The 2nd letter CANNOT be sent less than 2 weeks before the meeting. Dec 12 minus 2 weeks = November 28th is the absolute deadline." },

  { cat:"⚠️ Violations", badge:"badge-viol",
    scenario:"You're preparing packets for an upcoming Fine Hearing Meeting with 3 jury members.",
    question:"How many total packets do you need to make?",
    options:["3","4","5","6"], correct:2,
    explanation:"5 total: 3 for the jury, 1 for yourself, and 1 for the manager." },

  { cat:"⚠️ Violations", badge:"badge-viol",
    scenario:"The jury approved a fine after the hearing. You need to notify the resident.",
    question:"How must the 3rd violation letter be sent?",
    options:["Regular mail","Email only","Certified Mail","Hand delivered"], correct:2,
    explanation:"After jury approval, the 3rd letter MUST be sent via Certified Mail. Also check if the mailing address differs from the Village Walk address." },

  { cat:"⚠️ Violations", badge:"badge-viol",
    scenario:"A resident calls and asks you personally to grant them a 30-day extension on their violation.",
    question:"What do you tell them?",
    options:["Sure, I can approve that","I'll check with the manager","The office cannot grant extensions — only the jury can approve or deny fines","Extensions require a written request"], correct:2,
    explanation:"The office cannot grant extensions, approve or deny fines. The final determination rests solely with the jury. You can document their communication, which may weigh positively." },

  { cat:"⚠️ Violations", badge:"badge-viol",
    scenario:"You need to notify the community about an upcoming Fine Hearing Meeting.",
    question:"How far in advance must you notify them?",
    options:["24 hours","48 hours","72 hours","1 week"], correct:1,
    explanation:"The community must be notified 48 hours in advance of the Fine Hearing Meeting." },

  { cat:"🏦 Accounts Receivable", badge:"badge-ar",
    scenario:"You receive an FPL utility bill for The Village Spot.",
    question:"Where do you send it, and what must be attached?",
    options:["payables@ipre.com, nothing extra","thevillagespot239@gmail.com with FPL and CCU statements attached","villagewalkhoaofnaples@kwpmc.com with the bill","thevillagespot239@gmail.com, no attachments"], correct:1,
    explanation:"Village Spot FPL and CCU invoices go to thevillagespot239@gmail.com. Always attach both the FPL and CCU statements." },

  { cat:"🏦 Accounts Receivable", badge:"badge-ar",
    scenario:"It's the first of the month. You need to send the rent invoice for Illustrated Properties.",

    options:["thevillagespot239@gmail.com","villagewalkhoaofnaples@kwpmc.com","payables@ipre.com","illustratedproperties@kwpmc.com"], correct:2,
    explanation:"Illustrated Properties rent invoices are sent to payables@ipre.com. Rent is due on the 1st — only the billing dates change, the amount stays the same." },

  { cat:"🏠 Sales Applications", badge:"badge-sales",

  { cat:"🏠 Sales Applications", badge:"badge-sales",
    scenario:"You're uploading a completed sale application to KWIC Documents.",

    explanation:"Title format is: Last Name(s) Sale Application, Year — e.g., 'Smith Sale Application, 2025'." },
  // ── COMMUNITY POLICIES ──

  { cat:"🏘️ Community Policies", badge:"badge-comm",

  // ── ACC & ARCHITECTURE ──

  { cat:"🏗️ ACC & Architecture", badge:"badge-arch",
    scenario:"A homeowner gets ACC approval for a landscaping project but hasn't started after 7 months.",

    explanation:"Homeowners have 6 months from the date of approval to complete all approved changes. If not finished, they must re-apply or notify the Town Manager of the delay." },

  { cat:"🏗️ ACC & Architecture", badge:"badge-arch",
    scenario:"A homeowner calls asking if they can install a wood privacy fence around their backyard.",
    question:"What is Village Walk's policy on fences?",

    explanation:"Per the ACC Architectural Planning Criteria: no fence of any height or style is permitted in Village Walk, without exception." },

  { cat:"🏗️ ACC & Architecture", badge:"badge-arch",
    scenario:"A homeowner wants to make changes to their landscaping — add new plants and remove a small tree.",
    question:"What is required before ANY landscape change can begin?",
    options:["Just notify the office by phone","Submit a Landscape Change Application and receive prior written approval from the Landscape Committee","Get neighbor's permission only","Nothing — minor landscaping doesn't need approval"], correct:1,
    explanation:"All landscape changes, regardless of scope, require submitting a Landscape Change Application and receiving prior written approval from the Landscape Committee before work begins. A plot plan must also accompany the form." },

  { cat:"🏗️ ACC & Architecture", badge:"badge-arch",
    scenario:"A homeowner is replacing their roof and asks what tile they must use.",
    question:"Which of the following is an approved roof tile option for Village Walk?",
    options:["Any gray or brown Spanish tile","Santa Fe Spanish 'S' Clay tile: 40% Red, 40% Peach, 20% Coffee","Flat concrete tile in terracotta","Any tile matching the original color"], correct:1,
    explanation:"Two approved options: (1) Santa Fe Spanish 'S' Clay tile — 40% Red, 40% Peach, 20% Coffee; or (2) Verea Spanish 'S' tile — 40% Red, 40% Peach, 20% Graphite. Both must be installed in a random non-repeating mix pattern." },

  { cat:"🏗️ ACC & Architecture", badge:"badge-arch",
    scenario:"A homeowner wants to install a freestanding flagpole in their front yard.",
    question:"What is the maximum height allowed for a freestanding flagpole?",
    options:["10 feet","15 feet","20 feet","25 feet"], correct:1,
    explanation:"Any homeowner may erect a freestanding flagpole no more than 15 feet high on their real property, provided it does not obstruct sightlines at intersections or sit within an easement." },

  { cat:"🏗️ ACC & Architecture", badge:"badge-arch",
    scenario:"A homeowner is installing new coach lights and asks what size and color the frame must be.",
    question:"What are the ACC requirements for coach lights?",

  // ── HOTWIRE SERVICES ──

  { cat:"📡 HotWire Services", badge:"badge-hot",

    explanation:"Included at no extra cost: Expanded Basic TV, Digital Favorites Package, 1 Fision HD Box, HD Service, Multi-Room DVR Service, HBO and Encore, High Speed Internet 300 (300 Mbps up/down), and an Eero Pro 6E Router." },

  { cat:"📡 HotWire Services", badge:"badge-hot",

  { cat:"📡 HotWire Services", badge:"badge-hot",

    explanation:"HotWire customer support can be reached at (800) 355-5668 or at gethotwired.com/support. Note: (239) 594-8044 is the Village Walk HOA office number — don't confuse the two." },

  { cat:"📡 HotWire Services", badge:"badge-hot",
    scenario:"A resident wants to record their favorite shows. They ask about the DVR box rental.",
    question:"How much is the Fision HD/DVR Box per month, and is there a limit?",

const ALL_CATS = ["All", "💰 Fees & Applications", "📋 Leases & Renewals", "⚠️ Violations", "🏦 Accounts Receivable", "🏠 Sales Applications", "🏘️ Community Policies", "🏗️ ACC & Architecture", "📡 HotWire Services", "📝 AR Forms"];

let state = {
  filter: "All",
  pool: [],
  current: 0,
  selected: null,
  revealed: false,
  score: 0,
  answers: [],
  finished: false
};

function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

function getPool(filter) {
  const qs = filter === "All" ? questions : questions.filter(q => q.cat === filter);
  return shuffle(qs);
}

function init() {
  state.pool = getPool(state.filter);
  state.current = 0; state.selected = null; state.revealed = false;
  state.score = 0; state.answers = []; state.finished = false;
  render();
}

function setFilter(f) {
  state.filter = f;
  init();
}

function selectOption(i) {
  if (state.revealed) return;
  state.selected = i;
  state.revealed = true;
  const q = state.pool[state.current];
  const correct = i === q.correct;
  if (correct) state.score++;
  state.answers.push({ question: q.question, cat: q.cat, correct });
  render();
}

function next() {
  if (state.current + 1 >= state.pool.length) { state.finished = true; }
  else { state.current++; state.selected = null; state.revealed = false; }
  render();
}

function renderFilters() {
  const el = document.getElementById("filters");
  el.innerHTML = ALL_CATS.map(cat =>
    `<button class="filter-btn${state.filter === cat ? " active" : ""}" onclick="setFilter('${cat.replace(/'/g,"\\'")}')">
      ${cat === "All" ? "All Topics" : cat}
    </button>`
  ).join("");
}

function render() {
  renderFilters();
  const card = document.getElementById("card");
  const pool = state.pool;

  if (state.finished || pool.length === 0) {
    const pct = pool.length ? Math.round((state.score / pool.length) * 100) : 0;
    const cls = pct >= 80 ? "score-green" : pct >= 60 ? "score-amber" : "score-red";
    const msg = pct >= 80 ? "🎉 Strong work — you know this material!" : pct >= 60 ? "📚 Getting there — review the ones you missed." : "🔄 Keep practicing — this is what the quiz is for!";
    card.innerHTML = `
      <div class="results">
        <div class="big-score ${cls}">${pct}%</div>
        <p class="result-sub">You got <strong>${state.score}</strong> of <strong>${pool.length}</strong> correct</p>
        <p class="result-msg">${msg}</p>
        <div class="answer-list">
          ${state.answers.map(a => `
            <div class="answer-item ${a.correct ? "ok" : "err"}">
              <span class="answer-icon">${a.correct ? "✅" : "❌"}</span>
              <span><span class="answer-cat">${a.cat}:</span> ${a.question}</span>
            </div>`).join("")}
        </div>
        <button class="restart-btn" onclick="init()">Try Again 🔄</button>
      </div>`;
    return;
  }

  const q = pool[state.current];
  const pct = ((state.current + 1) / pool.length * 100).toFixed(1);

  card.innerHTML = `
    <div class="progress-row">
      <span class="badge ${q.badge}">${q.cat}</span>
      <span class="score-text">${state.current + 1} / ${pool.length} &bull; Score: ${state.score}</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>

    <div class="scenario-box">
      <div class="scenario-label">Scenario</div>
      <div class="scenario-text">${q.scenario}</div>
    </div>

    <div class="question">${q.question}</div>

    <div class="options">
      ${q.options.map((opt, i) => {
        let cls = "";
        if (state.revealed) {
          if (i === q.correct) cls = "correct";
          else if (i === state.selected && i !== q.correct) cls = "wrong";
          else cls = "dimmed";
        }
        return `<button class="option-btn ${cls}" onclick="selectOption(${i})" ${state.revealed ? "disabled" : ""}>
          <span class="letter">${["A","B","C","D"][i]}.</span>${opt}
        </button>`;
      }).join("")}
    </div>

    ${state.revealed ? `
      <div class="explanation">
        <div class="explanation-label ${state.selected === q.correct ? "ok" : "err"}">
          ${state.selected === q.correct ? "✅ Correct!" : "❌ Not quite —"}
        </div>
        <div class="explanation-text">${q.explanation}</div>
      </div>
      <button class="next-btn" onclick="next()">
        ${state.current + 1 >= pool.length ? "See My Results →" : "Next Question →"}
      </button>` : ""}
  `;
}

init();
</script>
</body>
</html>
